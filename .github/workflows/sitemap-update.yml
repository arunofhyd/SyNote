name: Auto Update Sitemap

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'sitemap.xml'
      - '.github/**'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Sitemap Lastmod
        run: |
          TODAY=2026-07-23
          if [ -f "sitemap.xml" ]; then
            sed -i "s/<lastmod>.*<\/lastmod>/<lastmod><\/lastmod>/g" sitemap.xml
          fi

      - name: Commit & Push Changes
        run: |
          git config user.name "arunofhyd"
          git config user.email "arunthomas04042001@gmail.com"
          if [[ -n $(git status --porcelain sitemap.xml) ]]; then
            git add sitemap.xml
            git commit -m "auto: update sitemap lastmod date [skip ci]"
            git push
          fi